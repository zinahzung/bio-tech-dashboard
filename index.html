  <button

      padding: "10px 20px",
      border: "none",

      background: active ? "#eff6ff" : "transparent",
      color: active ? "#1d4ed8" : "#4b5563",

    {children}

  <span

      display: "inline-block",

);

// ===== MAIN APP =====
function BioTechDashboard() {
  const [activeTab, setActiveTab] = useState("timeline");
  const [selectedYear, setSelectedYear] = useState(null);
  const [selectedTheme, setSelectedTheme] = useState(null);
  const [selectedTech, setSelectedTech] = useState(null);
  const [companyTheme, setCompanyTheme] = useState("유전자편집/치료");
  const [companySubTab, setCompanySubTab] = useState("domestic_listed");

  const years = Object.keys(TECH_TIMELINE).map(Number).sort();

  const allTechs = useMemo(() => {
    const techs = [];
    Object.entries(TECH_TIMELINE).forEach(([year, items]) => {
      items.forEach((t) => techs.push({ ...t, year: Number(year) }));
    });
    return techs;
  }, []);

  const filteredTechs = useMemo(() => {
    let result = allTechs;
    if (selectedYear) result = result.filter((t) => t.year === selectedYear);
    if (selectedTheme) result = result.filter((t) => t.theme === selectedTheme);
    return result;
  }, [allTechs, selectedYear, selectedTheme]);

  const themeCounts = useMemo(() => {
    const counts = {};
    allTechs.forEach((t) => {
      counts[t.theme] = (counts[t.theme] || 0) + 1;
    });
    return counts;
  }, [allTechs]);

  const themeByYear = useMemo(() => {
    const map = {};
    allTechs.forEach((t) => {
      const key = `${t.year}-${t.theme}`;
      map[key] = (map[key] || 0) + 1;
    });
    return map;
  }, [allTechs]);

  return (
    <div style={{ fontFamily: "'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", background: "#f8fafc", minHeight: "100vh" }}>
      {/* Header */}
      <header style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)", color: "white", padding: "32px 24px 16px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 4, letterSpacing: 2 }}>BICS 바이오혁신연계서비스 기반</div>
          <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 6px 0", lineHeight: 1.3 }}>
            바이오 기술혁신 발전흐름 &amp; 시장분석 대시보드
          </h1>
          <p style={{ color: "#94a3b8", fontSize: 14, margin: 0 }}>
            2015~2026 | {allTechs.length}개 유망기술 | {THEMES.length}개 테마 분류 | 기술 혁신성 × 시장규모 × 상용화단계 분석
          </p>
          {/* Navigation Tabs */}
          <div style={{ display: "flex", gap: 0, marginTop: 20, borderBottom: "1px solid #334155" }}>
            {[
              ["timeline", "발전흐름 타임라인"],
              ["themes", "테마별 분석"],
              ["companies", "기업 심층분석"],
              ["global", "글로벌기술"],
              ["matrix", "혁신·시장·상용화"],
            ].map(([key, label]) => (
              <button
                key={key}
                onClick={() => setActiveTab(key)}
                style={{
                  padding: "12px 20px",
                  border: "none",
                  borderBottom: activeTab === key ? "3px solid #3b82f6" : "3px solid transparent",
                  background: "transparent",
                  color: activeTab === key ? "#fff" : "#94a3b8",
                  fontWeight: activeTab === key ? 700 : 400,
                  cursor: "pointer",
                  fontSize: 14,
                  transition: "all 0.2s",
                }}
              >
                {label}
              </button>
            ))}
          </div>
        </div>
      </header>

      <main style={{ maxWidth: 1200, margin: "0 auto", padding: "24px" }}>
        {/* ===== TAB 1: TIMELINE ===== */}
        {activeTab === "timeline" && (
          <div>
            {/* Filters */}
            <div style={{ display: "flex", gap: 12, marginBottom: 24, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "#6b7280", fontWeight: 600 }}>연도:</span>
              <button
                onClick={() => setSelectedYear(null)}
                style={{
                  padding: "4px 12px", borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, cursor: "pointer",
                  background: !selectedYear ? "#1d4ed8" : "#fff", color: !selectedYear ? "#fff" : "#374151",
                }}
              >
                전체
              </button>
              {years.map((y) => (
                <button
                  key={y}
                  onClick={() => setSelectedYear(selectedYear === y ? null : y)}
                  style={{
                    padding: "4px 12px", borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, cursor: "pointer",
                    background: selectedYear === y ? "#1d4ed8" : "#fff", color: selectedYear === y ? "#fff" : "#374151",
                  }}
                >
                  {y}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 24, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: "#6b7280", fontWeight: 600 }}>테마:</span>
              <button
                onClick={() => setSelectedTheme(null)}
                style={{
                  padding: "4px 12px", borderRadius: 6, border: "1px solid #d1d5db", fontSize: 12, cursor: "pointer",
                  background: !selectedTheme ? "#1d4ed8" : "#fff", color: !selectedTheme ? "#fff" : "#374151",
                }}

                    padding: "4px 12px", borderRadius: 6, border: `1px solid ${th.color}60`, fontSize: 12, cursor: "pointer",
                    background: selectedTheme === th.id ? th.color : "#fff",
                    color: selectedTheme === th.id ? "#fff" : th.color,
                  }}
                >
                  {th.icon} {th.id} ({themeCounts[th.id] || 0})

              ))}
            </div>

            {/* Timeline Grid */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
              {filteredTechs.map((tech, idx) => {

                return (
                  <div
                    key={idx}

                      background: "#fff",

                      padding: 16,
                      cursor: "pointer",
                      transition: "all 0.2s",
                      borderLeft: `4px solid ${themeObj?.color}`,
                    }}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 8 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", background: "#f1f5f9", padding: "2px 8px", borderRadius: 4 }}>
                        {tech.year}
                      </span>
                      <Badge color={themeObj?.color || "#666"}>{themeObj?.icon} {tech.theme}</Badge>
                    </div>
                    <h3 style={{ fontSize: 15, fontWeight: 700, margin: "8px 0 4px", color: "#1e293b", lineHeight: 1.4 }}>{tech.name}</h3>
                    <p style={{ fontSize: 12, color: "#6b7280", margin: 0, lineHeight: 1.5 }}>{tech.desc}</p>
                    {BICS_SN_MAP[tech.name] && (
                      <a
                        href={`https://www.bics.re.kr/tech/techYear?emergingTechSn=${BICS_SN_MAP[tech.name]}`}
                        target="_blank"
                        rel="noopener noreferrer"
                        onClick={(e) => e.stopPropagation()}
                        style={{
                          display: "inline-flex", alignItems: "center", gap: 4,
                          marginTop: 8, padding: "4px 10px", fontSize: 11, fontWeight: 600,
                          color: "#fff", background: themeObj?.color || "#3b82f6",
                          borderRadius: 4, textDecoration: "none", transition: "opacity 0.2s",
                        }}
                        onMouseEnter={(e) => e.currentTarget.style.opacity = "0.8"}
                        onMouseLeave={(e) => e.currentTarget.style.opacity = "1"}
                      >
                        BICS 상세보기 ↗
                      </a>
                    )}
                  </div>
                );
              })}
            </div>
            <p style={{ textAlign: "center", color: "#9ca3af", fontSize: 13, marginTop: 16 }}>
              총 {filteredTechs.length}개 기술 표시 중
            </p>
          </div>
        )}

        {/* ===== TAB 2: THEMES ===== */}
        {activeTab === "themes" && (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20, color: "#1e293b" }}>테마별 기술 분포 (2015~2026)</h2>
            {/* Heatmap */}
            <div style={{ overflowX: "auto", marginBottom: 32 }}>
              <table style={{ borderCollapse: "collapse", width: "100%" }}>
                <thead>
                  <tr>
                    <th style={{ padding: "8px 12px", textAlign: "left", fontSize: 12, color: "#6b7280", position: "sticky", left: 0, background: "#f8fafc", zIndex: 1 }}>테마</th>
                    {years.map((y) => (
                      <th key={y} style={{ padding: "8px 6px", textAlign: "center", fontSize: 12, color: "#6b7280", minWidth: 48 }}>{y}</th>
                    ))}
                    <th style={{ padding: "8px 12px", textAlign: "center", fontSize: 12, color: "#6b7280", fontWeight: 700 }}>합계</th>
                  </tr>
                </thead>
                <tbody>
                  {THEMES.map((th) => (
                    <tr key={th.id}>
                      <td style={{ padding: "6px 12px", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", position: "sticky", left: 0, background: "#fff", zIndex: 1 }}>
                        {th.icon} {th.id}
                      </td>
                      {years.map((y) => {
                        const count = themeByYear[`${y}-${th.id}`] || 0;
                        const opacity = count === 0 ? 0 : Math.min(0.2 + count * 0.25, 1);
                        return (
                          <td key={y} style={{ padding: "4px", textAlign: "center" }}>
                            <div
                              style={{
                                width: 40, height: 32, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center",
                                background: count > 0 ? th.color : "#f1f5f9",
                                opacity: count > 0 ? opacity : 1,
                                color: count > 0 ? "#fff" : "#d1d5db", fontSize: 12, fontWeight: 700, margin: "0 auto",
                              }}
                            >
                              {count || "·"}
                            </div>
                          </td>
                        );
                      })}
                      <td style={{ padding: "6px 12px", textAlign: "center", fontWeight: 700, color: th.color }}>
                        {themeCounts[th.id] || 0}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Theme Trend Summary */}
            <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: "#1e293b" }}>테마별 기술 진화 흐름</h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(350px, 1fr))", gap: 16 }}>
              {THEMES.filter(th => themeCounts[th.id] >= 3).map((th) => {
                const techs = allTechs.filter(t => t.theme === th.id).sort((a,b) => a.year - b.year);
                return (
                  <div key={th.id} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 16, borderLeft: `4px solid ${th.color}` }}>

                      {techs.map((t, i) => (
                        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "start" }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: th.color, marginTop: 5, flexShrink: 0 }} />
                          <div>
                            <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8" }}>{t.year}</span>{" "}

                          </div>
                        </div>
                      ))}

                  </div>

            </div>
          </div>

                  style={{
                    padding: "6px 14px", borderRadius: 8, border: `1px solid ${th.color}60`, fontSize: 13, cursor: "pointer",
                    background: companyTheme === th.id ? th.color : "#fff",
                    color: companyTheme === th.id ? "#fff" : th.color,
                    fontWeight: companyTheme === th.id ? 700 : 500,
                  }}
                >
                  {th.icon} {th.id}
                </button>
              ))}
            </div>

            {COMPANY_DATA[companyTheme] && (
              <div>
                {/* Innovation & Market Scores */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 24 }}>
                  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 20 }}>

                    <ScoreBar label="상용화단계" score={COMPANY_DATA[companyTheme].commercialization_score} color="#d97706" />
                  </div>
                  <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 20, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center" }}>
                    <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 4 }}>성장 트렌드</div>

                    <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 8 }}>기업 분포</div>
                    <div style={{ fontSize: 13 }}>
                      <div>국내 상장: <b>{COMPANY_DATA[companyTheme].domestic_listed.length}</b></div>

                />

              {Object.entries(GLOBAL_TECH).map(([source, data]) => (
                <div key={source} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 20 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 800, margin: "0 0 4px", color: "#1e293b" }}>{source}</h3>
                  <p style={{ fontSize: 12, color: "#6b7280", margin: "0 0 16px" }}>수록 기간: {data.years}</p>
                  <div>
                    {data.items.map((item, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#3b82f6", flexShrink: 0 }} />
                        <span style={{ fontSize: 13, color: "#374151" }}>{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginTop: 24, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, color: "#1e293b" }}>글로벌 기술 트렌드와 BICS 미래기술 연결고리</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, fontSize: 13 }}>
                <div>
                  <p style={{ fontWeight: 600, marginBottom: 8 }}>바이오 관련 주요 글로벌 기술</p>
                  <div style={{ lineHeight: 2 }}>
                    <div>• 줄기세포 치료 (MIT/WEF 2025) → BICS 세포 역노화, 디지털 인공장기</div>
                    <div>• HIV 장기지속 예방제 (MIT 2025) → BICS 개인 맞춤형 암백신</div>
                    <div>• 생성형 AI (MIT 2025) → BICS AI 기반 인공 단백질 설계, 가상 세포</div>
                    <div>• 소형언어모델 (MIT 2025) → BICS 바이오 파운데이션 모델</div>
                  </div>
                </div>
                <div>
                  <p style={{ fontWeight: 600, marginBottom: 8 }}>글로벌-국내 기술 정합도 분석</p>
                  <div style={{ lineHeight: 2 }}>
                    <div>• AI+바이오 융합: <span style={{color:"#059669",fontWeight:700}}>높음</span> — 국내 AI 신약개발 스타트업 활발</div>
                    <div>• 유전자편집 치료: <span style={{color:"#059669",fontWeight:700}}>높음</span> — 글로벌 승인 기술 국내 파이프라인 매칭</div>
                    <div>• 세포배양/대체육: <span style={{color:"#ca8a04",fontWeight:700}}>중간</span> — 상업화 격차 존재</div>
                    <div>• 합성생물학: <span style={{color:"#ca8a04",fontWeight:700}}>중간</span> — 바이오파운드리 인프라 격차</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ===== TAB 5: INNOVATION × MARKET MATRIX ===== */}
        {activeTab === "matrix" && (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 8, color: "#1e293b" }}>기술 혁신성 × 시장규모 매트릭스</h2>
            <p style={{ fontSize: 13, color: "#6b7280", marginBottom: 24 }}>X축: 기술 혁신성, Y축: 시장규모(TAM). 버블 크기는 상용화단계 점수에 비례합니다. 클릭하면 기업분석으로 이동합니다.</p>

            <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, padding: 24, position: "relative" }}>
              {/* Axis Labels */}
              <div style={{ position: "absolute", left: -4, top: "50%", transform: "rotate(-90deg) translateX(50%)", fontSize: 12, color: "#6b7280", fontWeight: 600 }}>시장규모(TAM) →</div>
              <div style={{ textAlign: "center", fontSize: 12, color: "#6b7280", fontWeight: 600, marginBottom: 8 }}>기술 혁신성 →</div>

              {/* Quadrant labels */}
              <div style={{ position: "relative", height: 420, background: "#fafbfc", borderRadius: 8, border: "1px solid #f1f5f9", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: 8, left: 8, fontSize: 11, color: "#d1d5db" }}>큰 시장 / 낮은 혁신</div>
                <div style={{ position: "absolute", top: 8, right: 8, fontSize: 11, color: "#059669", fontWeight: 600 }}>★ 높은 혁신 + 큰 시장</div>
                <div style={{ position: "absolute", bottom: 8, left: 8, fontSize: 11, color: "#ef4444" }}>낮은 혁신 / 작은 시장</div>
                <div style={{ position: "absolute", bottom: 8, right: 8, fontSize: 11, color: "#d1d5db" }}>높은 혁신 / 작은 시장</div>

                {/* Grid lines */}
                <div style={{ position: "absolute", top: 0, bottom: 0, left: "50%", borderLeft: "1px dashed #e2e8f0" }} />
                <div style={{ position: "absolute", left: 0, right: 0, top: "50%", borderTop: "1px dashed #e2e8f0" }} />

                {/* Bubbles — size = commercialization stage */}
                {THEMES.filter(th => COMPANY_DATA[th.id]).map((th) => {
                  const data = COMPANY_DATA[th.id];
                  const x = ((data.innovation_score - 40) / 60) * 90 + 5;
                  const y = 95 - ((data.market_size_score - 40) / 60) * 90;
                  const size = Math.max(28, Math.min(70, data.commercialization_score * 0.7));

                  return (
                    <div
                      key={th.id}
                      onClick={() => { setActiveTab("companies"); setCompanyTheme(th.id); }}
                      style={{
                        position: "absolute",
                        left: `${x}%`, top: `${y}%`,
                        transform: "translate(-50%, -50%)",
                        width: size, height: size, borderRadius: "50%",
                        background: th.color + "30",
                        border: `2px solid ${th.color}`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        cursor: "pointer",
                        transition: "all 0.3s",
                        zIndex: 2,
                      }}
                      title={`${th.id}: 혁신 ${data.innovation_score} / 시장규모 ${data.market_size_score} / 상용화 ${data.commercialization_score}`}
                    >
                      <span style={{ fontSize: 16 }}>{th.icon}</span>
                    </div>
                  );
                })}
              </div>

              {/* Legend */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginTop: 16, justifyContent: "center" }}>
                {THEMES.filter(th => COMPANY_DATA[th.id]).map((th) => (
                  <div key={th.id} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: th.color }} />
                    <span>{th.icon} {th.id}</span>
                  </div>
                ))}
              </div>
              <p style={{ textAlign: "center", fontSize: 11, color: "#9ca3af", marginTop: 8 }}>※ 버블 크기 = 상용화단계 점수 (클수록 상용화 진행도 높음)</p>
            </div>

            {/* Summary Table */}
            <div style={{ marginTop: 24, overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, background: "#fff" }}>
                <thead>
                  <tr style={{ background: "#f8fafc" }}>
                    <th style={{ padding: "10px 12px", textAlign: "left", borderBottom: "2px solid #e2e8f0" }}>테마</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>혁신성</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>시장규모</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>상용화</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>트렌드</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>국내</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>해외</th>
                    <th style={{ padding: "10px 12px", textAlign: "center", borderBottom: "2px solid #e2e8f0" }}>종합</th>
                  </tr>
                </thead>
                <tbody>
                  {THEMES.filter(th => COMPANY_DATA[th.id]).sort((a,b) => {
                    const scoreA = COMPANY_DATA[a.id].innovation_score + COMPANY_DATA[a.id].market_size_score + COMPANY_DATA[a.id].commercialization_score;
                    const scoreB = COMPANY_DATA[b.id].innovation_score + COMPANY_DATA[b.id].market_size_score + COMPANY_DATA[b.id].commercialization_score;
                    return scoreB - scoreA;
                  }).map((th) => {
                    const d = COMPANY_DATA[th.id];
                    const domestic = (d.domestic_listed?.length || 0) + (d.domestic_private?.length || 0);
                    const global = (d.global_listed?.length || 0) + (d.global_private?.length || 0);
                    const totalScore = d.innovation_score + d.market_size_score + d.commercialization_score;
                    const grade = totalScore >= 250 ? "A+" : totalScore >= 220 ? "A" : totalScore >= 190 ? "B+" : totalScore >= 160 ? "B" : "C";
                    const gradeColor = grade.startsWith("A") ? "#059669" : grade.startsWith("B") ? "#2563eb" : "#ca8a04";
                    const commLabel = d.commercialization_score >= 75 ? "상용화" : d.commercialization_score >= 50 ? "임상/실증" : d.commercialization_score >= 30 ? "초기임상" : "연구단계";
                    const commColor = d.commercialization_score >= 75 ? "#059669" : d.commercialization_score >= 50 ? "#2563eb" : d.commercialization_score >= 30 ? "#d97706" : "#ef4444";
                    return (
                      <tr key={th.id} style={{ borderBottom: "1px solid #f1f5f9" }}>
                        <td style={{ padding: "10px 12px", fontWeight: 600 }}>{th.icon} {th.id}</td>
                        <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: "#2563eb" }}>{d.innovation_score}</td>
                        <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: "#059669" }}>{d.market_size_score}</td>
                        <td style={{ padding: "10px 12px", textAlign: "center" }}><span style={{ fontSize: 11, fontWeight: 600, color: commColor, background: commColor + "15", padding: "2px 8px", borderRadius: 4 }}>{commLabel} ({d.commercialization_score})</span></td>
                        <td style={{ padding: "10px 12px", textAlign: "center" }}><Badge color={th.color}>{d.trend}</Badge></td>
                        <td style={{ padding: "10px 12px", textAlign: "center" }}>{domestic}</td>
                        <td style={{ padding: "10px 12px", textAlign: "center" }}>{global}</td>
                        <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 800, fontSize: 16, color: gradeColor }}>{grade}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer style={{ textAlign: "center", padding: "24px", color: "#9ca3af", fontSize: 12, borderTop: "1px solid #e2e8f0", marginTop: 32 }}>
        데이터 출처: BICS 바이오혁신연계서비스 (www.bics.re.kr) | 기업 데이터는 공개 정보 기반 참고 수치 | 2026.04 기준
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BioTechDashboard));
</script>
</body>
</html>
